<!------------------------------------------------------------------------------
    A basic quadcopter simulator built using Three.js and C (WASM).
    This HTML page contains only a fullscreen Three.js view.

    How to launch:
        python3 -m http.server 8080 & firefox localhost:8080/index.html
    Simply opening index.html does not work due to CORS issues

    Author: Andrea Pavan
    License: MIT
------------------------------------------------------------------------------->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quadcopter Simulator</title>
    <style>
        body {
            margin: 0;
            overflow-y: hidden;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #pauseOverlay {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 24pt;
            text-align: center;
            padding-top: 20%;
            display: block;
        }
        #pauseOverlay .h1 {
            font-size: 48pt;
            margin-bottom: 20px;
        }
        #timeOverlay {
            position: absolute;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 24pt;
        }
        #timeOverlay.paused {
            color: rgba(100, 100, 100, 0.5);
        }
        #quickMenuOverlay {
            position: absolute;
            top: 10px;
            left: 100px;
        }
        #quickMenuOverlay a {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18pt;
            text-decoration: none;
        }
        #quickMenuOverlay a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- pause overlay -->
    <div id="pauseOverlay">
        <h1>Pause</h1>
        Controls: WASD for roll/pitch, arrows (&uarr;&darr;&larr;&rarr;) for thrust/yaw
        <br/>
        Press ESC to resume simulation
    </div>

    <!-- running overlay -->
    <div id="timeOverlay" class="paused">00:00</div>
    <div id="quickMenuOverlay"><a href="https://github.com/pavanandrea/QuadcopterFlightSimulator" target="_blank">GitHub</a></div>

    <!-- define an importmap to correctly load STLLoader and other addons -->
    <!-- that start with "import {...} from 'three';" -->
    <script type="importmap">
        {
            "imports": {
                "three": "./threejs/three.module.min.js",
                "three/addons/": "./threejs/addons/"
            }
        }
    </script>

    <!-- main logic -->
    <script type="text/javascript" src="simulator_web_interface.js"></script>
    <script type="module" src="index.js"></script>
</body>
</html>
